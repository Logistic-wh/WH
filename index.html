<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BKC Training</title>
    
    <!-- ชื่อที่จะปรากฏใต้ไอคอนเวลาปักหมุดหน้าจอ (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-title" content="BKC Training">
    <meta name="application-name" content="BKC Training">

    <!-- ส่วนสำคัญ: ตั้งค่า Logo สำหรับการปักหมุดหน้าจอ -->
    <!-- สำหรับ iPhone / iOS -->
    <link rel="apple-touch-icon" href="https://img1.pic.in.th/images/ChatGPT-Image-May-9-2026-10_42_59-AM.png">
    <!-- สำหรับ Android และ Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://img1.pic.in.th/images/ChatGPT-Image-May-9-2026-10_42_59-AM.png">
    <link rel="shortcut icon" href="https://img1.pic.in.th/images/ChatGPT-Image-May-9-2026-10_42_59-AM.png">
    <!-- สำหรับ Windows -->
    <meta name="msapplication-TileImage" content="https://img1.pic.in.th/images/ChatGPT-Image-May-9-2026-10_42_59-AM.png">

    <style>
        /* ตั้งค่าให้แสดงผลเต็มหน้าจอ 100% โดยไม่มีแถบ Header */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* ป้องกันการเลื่อนที่ตัว Body */
            background-color: #ffffff;
        }

        .main-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycby23eQxb5fwP46Ls6A151lF--qISlaBNQsPThNsRL786rRlHEqPawEXns7gbOoi0wXoNA/exec" 
            allow="geolocation; microphone; camera; clipboard-read; clipboard-write"
            title="BKC Training Content"
        ></iframe>
    </div>

</body>
</html>
